<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Faturamento AVATEK</title>
    <link rel="icon" type="image/x-icon" href="https://github.com/vmacagnani/api-pre-os/raw/main/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        #table-container thead { background-color: #4f46e5; color: white; }
        .status-pago { background-color: #dcfce7; color: #166534; }
        .status-a-vencer { background-color: #ffedd5; color: #9a3412; }
        .status-vencido { background-color: #fee2e2; color: #991b1b; font-weight: bold; }
        .status-analisada { background-color: #e0e7ff; color: #3730a3; }
        .status-contestacao { background-color: #fef9c3; color: #854d0e; }
        .status-enviado { background-color: #e0f2fe; color: #0369a1; }
        
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #table-container td { vertical-align: middle; }

        .status-dot {
            display: inline-block;
            width: 0.6rem;
            height: 0.6rem;
            border-radius: 50%;
            margin-right: 0.5rem;
            vertical-align: middle;
        }
        .dot-vencido { background-color: #ef4444; }
        .dot-urgente { background-color: #f97316; }
        .dot-atencao { background-color: #f59e0b; }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
        }
        .pulse-animation { animation: pulse 1.5s infinite; }

        .loader {
            border: 5px solid #f3f4f6;
            border-top: 5px solid #4f46e5;
            border-radius: 50%;
            width: 50px; height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .obs-input {
            border: 1px solid transparent;
            background: transparent;
            transition: all 0.2s;
            width: 100%;
            min-width: 220px;
            padding: 4px 6px;
            border-radius: 4px;
            font-size: 0.875rem;
            line-height: 1.25rem;
            resize: vertical;
            overflow: hidden;
            display: block;
        }
        .obs-input:hover { background: #f1f5f9; border-color: #cbd5e1; }
        .obs-input:focus { border-color: #4f46e5; outline: none; background: #fff; box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.1); }
    </style>
</head>
<body class="bg-slate-100 text-gray-800">

    <div class="container mx-auto p-4 sm:p-6 lg:p-8">
        <header class="text-center mb-8">
            <h1 class="text-3xl sm:text-4xl font-bold text-gray-900 flex items-center justify-center gap-4">
                <svg class="w-8 h-8 sm:w-10 sm:h-10 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                <span>Controle de Faturamento</span>
                <a href="https://www.avatek.saitro.com" target="_blank" rel="noopener noreferrer">
                    <img src="https://github.com/vmacagnani/api-pre-os/raw/main/logo-avatek-azul-laranja.svg" alt="Logo Avatek" class="h-10 sm:h-12">
                </a>
            </h1>
        </header>

        <div class="bg-white p-4 sm:p-6 rounded-xl shadow-md border border-gray-200 mb-8">
            <h2 class="text-2xl font-semibold mb-4">Adicionar Nova Fatura</h2>
            <form id="invoiceForm" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 items-end">
                <div><label class="block text-sm font-medium text-gray-700">Fornecedor</label><input class="mt-1 block w-full rounded-md border-gray-300 shadow-sm" type="text" name="Operadora" required></div>
                <div><label class="block text-sm font-medium text-gray-700">Nº Conta</label><input class="mt-1 block w-full rounded-md border-gray-300 shadow-sm" type="text" name="Nº Conta" required></div>
                <div><label class="block text-sm font-medium text-gray-700">Tipo</label><select class="mt-1 block w-full rounded-md border-gray-300 shadow-sm" name="Tipo" required><option value="Operadora">Operadora</option><option value="Serviços">Serviços</option></select></div>
                <div><label class="block text-sm font-medium text-gray-700">Valor</label><input class="mt-1 block w-full rounded-md border-gray-300 shadow-sm" type="number" step="0.01" name="Valor" required></div>
                <div><label class="block text-sm font-medium text-gray-700">Data de Vencimento</label><input class="mt-1 block w-full rounded-md border-gray-300 shadow-sm" type="date" name="Vencimento" required></div>
                <div><label class="block text-sm font-medium text-gray-700">Status</label><select class="mt-1 block w-full rounded-md border-gray-300 shadow-sm" name="Status" required><option value="A vencer">A vencer</option><option value="Enviado">Enviado</option><option value="Pago">Pago</option></select></div>
                <div><label class="block text-sm font-medium text-gray-700">Período de Referência</label><input class="mt-1 block w-full rounded-md border-gray-300 shadow-sm" type="text" name="Periodo de Referencia" placeholder="Mês por extenso" required></div>
                <div><label class="block text-sm font-medium text-gray-700">Responsável</label><select class="mt-1 block w-full rounded-md border-gray-300 shadow-sm" name="Responsavel" required><option value="Lucas Calvo">Lucas Calvo</option><option value="Tatiane Gouvea">Tatiane Gouvea</option><option value="Talita Silva">Talita Silva</option></select></div>
                <div><label class="block text-sm font-medium text-gray-700">Contestação</label><select class="mt-1 block w-full rounded-md border-gray-300 shadow-sm" name="Contestação"><option value="NÃO">Não</option><option value="SIM">Sim</option></select></div>
                <div><label class="block text-sm font-medium text-gray-700">Observação</label><input class="mt-1 block w-full rounded-md border-gray-300 shadow-sm" type="text" name="Obs"></div>
                <button type="submit" id="submitBtn" class="h-10 flex justify-center items-center gap-2 px-3 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 font-medium">Adicionar</button>
            </form>
        </div>

        <div class="bg-white p-4 sm:p-6 rounded-xl shadow-md border border-gray-200">
            <div class="flex flex-wrap justify-between items-center gap-4 mb-4">
                <h2 class="text-2xl font-semibold">Faturas Registradas</h2>
                <div class="flex items-center gap-4">
                    <input type="text" id="searchInput" class="block w-full rounded-md border-gray-300 shadow-sm" placeholder="Buscar na tabela...">
                    <button id="reloadBtn" class="flex items-center gap-2 px-3 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 transition-all">
                        <span>Recarregar</span>
                    </button>
                </div>
            </div>
            <div id="loading" class="flex flex-col items-center justify-center py-10"><div class="loader"></div></div>
            <div id="table-container" class="overflow-x-auto rounded-lg"></div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby3sgTf0QPAMBi-Ry7e7I9e7YJYwvyGafRk8ZLORKcFcKun2o-BzW6PKrmUIVHSOh3p/exec";
        let fullTableData = [];

        window.handleData = function(data) {
            document.getElementById('loading').classList.add('hidden');
            if (data && Array.isArray(data)) {
                fullTableData = data.sort((a, b) => new Date(b.Vencimento) - new Date(a.Vencimento));
                renderTable(fullTableData);
            }
        };

        function loadAndRenderTable() {
            document.getElementById('loading').classList.remove('hidden');
            const script = document.createElement('script');
            script.src = `${SCRIPT_URL}?callback=handleData&t=${new Date().getTime()}`;
            document.body.appendChild(script);
        }

        function formatCurrency(v) { return parseFloat(v || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }

        function autoResize(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }

        function getOperatorInfo(name) {
            const operator = String(name || '').toLowerCase();
            const providers = {
                'vivo': { color: 'bg-purple-100 text-purple-800', logo: 'https://img.logo.dev/vivo.com.br?token=pk_FGnHpYa7RVyBaPNWay1WYg' },
                'claro': { color: 'bg-red-100 text-red-800', logo: 'https://img.logo.dev/claro.com.br?token=pk_FGnHpYa7RVyBaPNWay1WYg' },
                'tim': { color: 'bg-blue-100 text-blue-800', logo: 'https://img.logo.dev/tim.com.br?token=pk_FGnHpYa7RVyBaPNWay1WYg' },
                'nlt': { color: 'bg-green-100 text-green-800', logo: 'https://img.logo.dev/nlt.com.br?token=pk_FGnHpYa7RVyBaPNWay1WYg' },
                'linksfield': { color: 'bg-pink-100 text-pink-800', logo: 'https://img.logo.dev/linksfield.com.br?token=pk_FGnHpYa7RVyBaPNWay1WYg' },
                'emnify': { color: 'bg-gray-200 text-gray-800', logo: 'https://img.logo.dev/emnify.com?token=pk_FGnHpYa7RVyBaPNWay1WYg' },
                'eseye': { color: 'bg-yellow-100 text-yellow-800', logo: 'https://img.logo.dev/eseye.com?token=pk_FGnHpYa7RVyBaPNWay1WYg' },
                'agendor': { color: 'bg-purple-100 text-purple-800', logo: 'https://img.logo.dev/agendor.com.br?token=pk_FGnHpYa7RVyBaPNWay1WYg' },
                'freshdesk': { color: 'bg-green-100 text-green-800', logo: 'https://img.logo.dev/freshdesk.com?token=pk_FGnHpYa7RVyBaPNWay1WYg' },
                'pluga': { color: 'bg-blue-100 text-blue-800', logo: 'https://img.logo.dev/pluga.co?token=pk_FGnHpYa7RVyBaPNWay1WYg' },
                'melhorenvio': { color: 'bg-blue-100 text-blue-800', logo: 'https://img.logo.dev/melhorenvio.com.br?token=pk_FGnHpYa7RVyBaPNWay1WYg' },
                'habitual': { color: 'bg-blue-100 text-blue-800', logo: 'https://img.logo.dev/hssol.com.br/?token=pk_FGnHpYa7RVyBaPNWay1WYg' }
            };
            const foundKey = Object.keys(providers).find(key => operator.includes(key));
            return foundKey ? providers[foundKey] : { color: 'bg-gray-100 text-gray-800', logo: null };
        }

        function renderTable(data) {
            const container = document.getElementById('table-container');
            if (!data.length) { container.innerHTML = ''; return; }

            const columnAlignments = { 'Valor': 'text-right', 'Vencimento': 'text-center', 'Status': 'text-center', 'Analisada': 'text-center', 'Contestação': 'text-center', 'Ações': 'text-center' };
            const headers = Object.keys(data[0]).filter(h => h !== 'rowIndex');
            headers.push('Ações');

            let html = `<table class="min-w-full divide-y divide-gray-200"><thead><tr>`;
            headers.forEach(h => html += `<th class="px-6 py-3 text-xs font-medium uppercase ${columnAlignments[h] || 'text-left'}">${h === 'Operadora' ? 'Fornecedor' : h}</th>`);
            html += `</tr></thead><tbody class="bg-white divide-y divide-gray-200">`;

            data.forEach(row => {
                html += `<tr>`;
                headers.forEach(h => {
                    let cellHtml = `<td class="px-6 py-4 text-sm text-gray-700 ${columnAlignments[h] || 'text-left'}">`;
                    if (h === 'Ações') {
                        cellHtml += `<div class="flex flex-wrap gap-1 justify-center w-32 mx-auto">
                            <button title="Pago" class="action-btn p-2 text-green-600 bg-green-100 hover:bg-green-200 rounded-lg" data-action="update" data-row-index="${row.rowIndex}" data-column="Status" data-value="Pago"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></button>
                            <button title="Enviado" class="action-btn p-2 text-sky-600 bg-sky-100 hover:bg-sky-200 rounded-lg" data-action="update" data-row-index="${row.rowIndex}" data-column="Status" data-value="Enviado"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg></button>
                            <button title="Analisada" class="action-btn p-2 text-indigo-600 bg-indigo-100 hover:bg-indigo-200 rounded-lg" data-action="update" data-row-index="${row.rowIndex}" data-column="Analisada" data-value="Sim"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg></button>
                            <button title="Contestada" class="action-btn p-2 text-yellow-600 bg-yellow-100 hover:bg-yellow-200 rounded-lg" data-action="update" data-row-index="${row.rowIndex}" data-column="Contestação" data-value="SIM"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 21v-4m0 0V5a2 2 0 012-2h6.5l1 1H21l-3 6 3 6H8.5l-1-1H5a2 2 0 00-2 2zm9-13.5V9"></path></svg></button>
                            <button title="Excluir" class="action-btn p-2 text-red-600 bg-red-100 hover:bg-red-200 rounded-lg" data-action="delete" data-row-index="${row.rowIndex}"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                        </div>`;
                    } else if (h === 'Operadora') {
                        const info = getOperatorInfo(row[h]);
                        const logo = info.logo ? `<img src="${info.logo}" class="h-4 inline mr-2 align-middle">` : '';
                        cellHtml += `<div class="flex items-center"><span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold ${info.color}">${logo}${row[h]}</span></div>`;
                    } else if (h === 'Obs') {
                        cellHtml += `<textarea class="obs-input" data-row-index="${row.rowIndex}" onblur="updateObsField(this)" oninput="autoResize(this)" rows="2">${row[h] || ''}</textarea>`;
                    } else if (h === 'Status') {
                        const st = String(row[h]).toLowerCase();
                        let cls = st === 'pago' ? 'status-pago' : st === 'enviado' ? 'status-enviado' : 'status-a-vencer';
                        cellHtml += `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold ${cls}">${row[h]}</span>`;
                    } else if (h === 'Analisada' || h === 'Contestação') {
                        const isSim = String(row[h]).toLowerCase() === 'sim';
                        cellHtml += isSim ? `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold ${h === 'Analisada' ? 'status-analisada' : 'status-contestacao'}">Sim</span>` : 'Não';
                    } else if (h === 'Valor') {
                        cellHtml += formatCurrency(row[h]);
                    } else if (h === 'Periodo de Referencia') {
                        const date = new Date(row[h]);
                        cellHtml += (date.getTime() && String(row[h]).includes('T')) ? date.toLocaleDateString('pt-BR', { month: 'short', year: 'numeric', timeZone: 'UTC' }).toUpperCase().replace('. DE','') : row[h];
                    } else if (h === 'Vencimento') {
                        const dt = new Date(row[h]);
                        cellHtml += dt.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', timeZone: 'UTC' });
                    } else {
                        cellHtml += row[h] || '';
                    }
                    html += cellHtml + `</td>`;
                });
                html += `</tr>`;
            });
            container.innerHTML = html + `</tbody></table>`;
            setTimeout(() => { document.querySelectorAll('textarea').forEach(autoResize); }, 50);
        }

        async function updateObsField(el) {
            el.style.opacity = "0.5";
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'update', rowIndex: el.dataset.rowIndex, column: 'Obs', value: el.value }) });
            el.style.opacity = "1";
        }

        async function handleActionClick(e) {
            const btn = e.target.closest('.action-btn');
            if (!btn) return;
            const { rowIndex, column, value, action } = btn.dataset;
            if (!confirm("Confirmar ação?")) return;
            btn.disabled = true;
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action, rowIndex, column, value }) });
            loadAndRenderTable();
        }

        document.getElementById('invoiceForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            const data = Object.fromEntries(new FormData(e.target).entries());
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
            e.target.reset();
            setTimeout(loadAndRenderTable, 1000);
            btn.disabled = false;
        });

        document.getElementById('reloadBtn').addEventListener('click', loadAndRenderTable);
        document.getElementById('table-container').addEventListener('click', handleActionClick);
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            renderTable(fullTableData.filter(r => Object.values(r).some(v => String(v).toLowerCase().includes(term))));
        });

        document.addEventListener('DOMContentLoaded', loadAndRenderTable);
    </script>
</body>
</html>
