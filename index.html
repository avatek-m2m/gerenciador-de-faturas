<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Faturamento AVATEK</title>
    <link rel="icon" type="image/x-icon" href="https://github.com/vmacagnani/api-pre-os/raw/main/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        #table-container thead { background-color: #4f46e5; color: white; }
        .status-pago { background-color: #dcfce7; color: #166534; }
        .status-a-vencer { background-color: #ffedd5; color: #9a3412; }
        .status-vencido { background-color: #fee2e2; color: #991b1b; font-weight: bold; }
        .status-analisada { background-color: #e0e7ff; color: #3730a3; }
        .status-contestacao { background-color: #fef9c3; color: #854d0e; }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .status-dot { display: inline-block; width: 0.6rem; height: 0.6rem; border-radius: 50%; margin-right: 0.5rem; vertical-align: middle; }
        .dot-vencido { background-color: #ef4444; }
        .dot-urgente { background-color: #f97316; }
        .dot-atencao { background-color: #f59e0b; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.7; } }
        .pulse-animation { animation: pulse 1.5s infinite; }
        .loader { border: 5px solid #f3f4f6; border-top: 5px solid #4f46e5; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .input-obs-edit { border-bottom: 1px solid transparent; transition: all 0.2s; width: 100%; min-width: 150px; }
        .input-obs-edit:focus { border-bottom-color: #4f46e5; outline: none; background: #f8fafc; }
    </style>
</head>
<body class="bg-slate-100 text-gray-800">

    <div class="container mx-auto p-4 sm:p-6 lg:p-8">
        <header class="text-center mb-8">
            <h1 class="text-3xl sm:text-4xl font-bold text-gray-900 flex items-center justify-center gap-4">
                <svg class="w-8 h-8 sm:w-10 sm:h-10 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                <span>Controle de Faturamento</span>
                <a href="https://www.avatek.saitro.com" target="_blank" rel="noopener noreferrer">
                    <img src="https://github.com/vmacagnani/api-pre-os/raw/main/logo-avatek-azul-laranja.svg" alt="Logo Avatek" class="h-10 sm:h-12">
                </a>
            </h1>
        </header>

        <div class="bg-white p-4 sm:p-6 rounded-xl shadow-md border border-gray-200 mb-8">
            <h2 class="text-2xl font-semibold mb-4">Adicionar Nova Fatura</h2>
            <form id="invoiceForm" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 items-end">
                <div><label class="block text-sm font-medium text-gray-700">Fornecedor</label><input class="mt-1 block w-full rounded-md border-gray-300 shadow-sm" type="text" name="Operadora" required></div>
                <div><label class="block text-sm font-medium text-gray-700">Nº Conta</label><input class="mt-1 block w-full rounded-md border-gray-300 shadow-sm" type="text" name="Nº Conta" required></div>
                <div><label class="block text-sm font-medium text-gray-700">Tipo</label><select class="mt-1 block w-full rounded-md border-gray-300 shadow-sm" name="Tipo" required><option value="Operadora">Operadora</option><option value="Serviços">Serviços</option></select></div>
                <div><label class="block text-sm font-medium text-gray-700">Valor</label><input class="mt-1 block w-full rounded-md border-gray-300 shadow-sm" type="number" step="0.01" name="Valor" required></div>
                <div><label class="block text-sm font-medium text-gray-700">Data de Vencimento</label><input class="mt-1 block w-full rounded-md border-gray-300 shadow-sm" type="date" name="Vencimento" required></div>
                <div><label class="block text-sm font-medium text-gray-700">Período Referência</label><input class="mt-1 block w-full rounded-md border-gray-300 shadow-sm" type="text" name="Periodo de Referencia" placeholder="AGO/2025" required></div>
                <div><label class="block text-sm font-medium text-gray-700">Responsável</label><select class="mt-1 block w-full rounded-md border-gray-300 shadow-sm" name="Responsavel"><option value="Vinícius">Vinícius</option><option value="Lucas">Lucas</option></select></div>
                <div><label class="block text-sm font-medium text-gray-700">Observação</label><input class="mt-1 block w-full rounded-md border-gray-300 shadow-sm" type="text" name="Obs" placeholder="Notas adicionais"></div>
                <button type="submit" id="submitBtn" class="h-10 flex justify-center items-center gap-2 px-3 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 font-medium">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                    <span>Adicionar</span>
                </button>
            </form>
        </div>

        <div class="bg-white p-4 sm:p-6 rounded-xl shadow-md border border-gray-200">
            <div class="flex flex-wrap justify-between items-center gap-4 mb-4">
                <h2 class="text-2xl font-semibold">Faturas Registradas</h2>
                <div class="flex items-center gap-4">
                    <input type="text" id="searchInput" class="block w-full rounded-md border-gray-300 shadow-sm" placeholder="Buscar na tabela...">
                    <button id="reloadBtn" class="flex items-center gap-2 px-3 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h5M20 20v-5h-5M20 4l-4 4M4 20l4-4"></path></svg>
                        <span>Recarregar</span>
                    </button>
                </div>
            </div>

            <div id="loading" class="flex flex-col items-center justify-center py-10"><div class="loader"></div><p class="text-gray-600 mt-4">Carregando dados...</p></div>
            <div id="error" class="text-center py-10 hidden"><p class="text-red-600 font-semibold">Erro ao carregar os dados.</p></div>
            <div id="table-container" class="overflow-x-auto rounded-lg"></div>
            <p id="no-results" class="text-center py-10 hidden text-gray-500">Nenhum resultado encontrado.</p>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby3sgTf0QPAMBi-Ry7e7I9e7YJYwvyGafRk8ZLORKcFcKun2o-BzW6PKrmUIVHSOh3p/exec"; // SUBSTITUA PELA SUA URL DO APPS SCRIPT

        const tableContainer = document.getElementById('table-container');
        const searchInput = document.getElementById('searchInput');
        const reloadBtn = document.getElementById('reloadBtn');
        const loadingDiv = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        const noResultsDiv = document.getElementById('no-results');
        const invoiceForm = document.getElementById('invoiceForm');
        const submitBtn = document.getElementById('submitBtn');
        let fullTableData = [];

        function handleData(data) {
            loadingDiv.classList.add('hidden');
            try {
                if (data.status === 'error' || !Array.isArray(data)) { throw new Error('Inválido'); }
                fullTableData = data.sort((a, b) => new Date(b.Vencimento) - new Date(a.Vencimento));
                renderTable(fullTableData);
            } catch (e) { errorDiv.classList.remove('hidden'); }
        }

        function loadAndRenderTable() {
            loadingDiv.classList.remove('hidden');
            errorDiv.classList.add('hidden');
            const oldScript = document.getElementById('jsonpScript');
            if (oldScript) oldScript.remove();
            const script = document.createElement('script');
            script.id = 'jsonpScript';
            script.src = SCRIPT_URL + "?callback=handleData";
            document.body.appendChild(script);
        }

        function formatCurrency(v) { return isNaN(parseFloat(v)) ? v : parseFloat(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }

        function getStatusInfo(s, d) {
            const st = String(s || '').toLowerCase();
            if (st.includes('pago')) return { class: 'status-pago', text: 'Pago' };
            const today = new Date(); today.setHours(0,0,0,0);
            const due = new Date(d);
            return (due < today) ? { class: 'status-vencido', text: 'Vencido' } : { class: 'status-a-vencer', text: 'A vencer' };
        }

        function getOperatorInfo(name) {
            const op = String(name || '').toLowerCase();
            const providers = {
                'vivo': { color: 'bg-purple-100 text-purple-800', logo: 'https://img.logo.dev/vivo.com.br?token=pk_FGnHpYa7RVyBaPNWay1WYg' },
                'claro': { color: 'bg-red-100 text-red-800', logo: 'https://img.logo.dev/claro.com.br?token=pk_FGnHpYa7RVyBaPNWay1WYg' },
                'tim': { color: 'bg-blue-100 text-blue-800', logo: 'https://img.logo.dev/tim.com.br?token=pk_FGnHpYa7RVyBaPNWay1WYg' }
            };
            const key = Object.keys(providers).find(k => op.includes(k));
            return key ? providers[key] : { color: 'bg-gray-100 text-gray-800', logo: null };
        }

        function renderTable(data) {
            if (data.length === 0) { noResultsDiv.classList.remove('hidden'); tableContainer.innerHTML = ''; return; }
            noResultsDiv.classList.add('hidden');
            
            const headers = Object.keys(data[0]).filter(h => h !== 'rowIndex');
            headers.push('Ações');

            const table = document.createElement('table');
            table.className = 'min-w-full divide-y divide-gray-200';
            
            let thead = `<thead><tr>`;
            headers.forEach(h => thead += `<th class="px-6 py-3 text-xs font-medium uppercase text-center">${h === 'Operadora' ? 'Fornecedor' : h}</th>`);
            thead += `</tr></thead>`;
            
            let tbody = `<tbody class="bg-white divide-y divide-gray-200">`;
            data.forEach(row => {
                tbody += `<tr>`;
                headers.forEach(h => {
                    let val = row[h];
                    let content = val;
                    
                    if (h === 'Ações') {
                        content = `<div class="flex gap-1 justify-center">
                            <button class="action-btn p-2 text-green-600 bg-green-50 rounded" data-action="update" data-row-index="${row.rowIndex}" data-column="Status" data-value="Pago">✔</button>
                            <button class="action-btn p-2 text-red-600 bg-red-50 rounded" data-action="delete" data-row-index="${row.rowIndex}">✘</button>
                        </div>`;
                    } else if (h === 'Obs') {
                        content = `<input type="text" class="input-obs-edit px-2 py-1 text-xs" value="${val || ''}" data-row-index="${row.rowIndex}" data-column="Obs" onblur="updateField(this)">`;
                    } else if (h === 'Operadora') {
                        const info = getOperatorInfo(val);
                        content = `<span class="px-2 py-1 rounded-full text-xs ${info.color}">${val}</span>`;
                    } else if (h === 'Status') {
                        const info = getStatusInfo(val, row.Vencimento);
                        content = `<span class="px-2 py-1 rounded-full text-xs ${info.class}">${info.text}</span>`;
                    } else if (h === 'Valor') {
                        content = formatCurrency(val);
                    } else if (h === 'Vencimento' || h === 'Inserido em') {
                        const d = new Date(val);
                        content = d.getTime() ? d.toLocaleDateString('pt-BR', {timeZone: 'UTC'}) : val;
                    }
                    
                    tbody += `<td class="px-4 py-3 text-sm text-center border-b">${content}</td>`;
                });
                tbody += `</tr>`;
            });
            tbody += `</tbody>`;
            
            table.innerHTML = thead + tbody;
            tableContainer.innerHTML = '';
            tableContainer.appendChild(table);
        }

        async function updateField(el) {
            const { rowIndex, column } = el.dataset;
            const val = el.value;
            el.style.opacity = '0.5';
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: 'update', rowIndex, column, value: val }),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });
                const idx = fullTableData.findIndex(i => i.rowIndex == rowIndex);
                if(idx > -1) fullTableData[idx][column] = val;
            } catch (e) { alert('Erro ao salvar'); }
            el.style.opacity = '1';
        }

        async function handleActionClick(e) {
            const btn = e.target.closest('.action-btn');
            if (!btn) return;
            const { rowIndex, column, value, action } = btn.dataset;
            if(!confirm('Confirmar ação?')) return;
            
            btn.disabled = true;
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action, rowIndex, column, value }),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });
                setTimeout(loadAndRenderTable, 500);
            } catch (e) { alert('Erro'); btn.disabled = false; }
        }

        invoiceForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            const formData = new FormData(invoiceForm);
            const data = Object.fromEntries(formData.entries());
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(data),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });
                invoiceForm.reset();
                setTimeout(loadAndRenderTable, 1000);
            } catch (e) { alert('Erro ao enviar'); }
            submitBtn.disabled = false;
        });

        searchInput.addEventListener('input', () => {
            const term = searchInput.value.toLowerCase();
            const filtered = fullTableData.filter(row => Object.values(row).some(v => String(v).toLowerCase().includes(term)));
            renderTable(filtered);
        });

        tableContainer.addEventListener('click', handleActionClick);
        reloadBtn.addEventListener('click', loadAndRenderTable);
        window.onload = loadAndRenderTable;
    </script>
</body>
</html>
